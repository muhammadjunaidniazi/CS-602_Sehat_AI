<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-label="Sehat AI home page screenshot preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071416"/>
      <stop offset="0.52" stop-color="#071b24"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e2630"/>
      <stop offset="1" stop-color="#0b1725"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="640" rx="24" fill="url(#bg)"/>
  <circle cx="100" cy="95" r="150" fill="#10b981" opacity="0.09"/>
  <circle cx="1080" cy="550" r="210" fill="#0ea5e9" opacity="0.08"/>

  <rect x="72" y="42" width="1056" height="56" rx="18" fill="#07131d" opacity="0.9"/>
  <text x="105" y="77" fill="#e7fff2" font-family="Arial, sans-serif" font-size="22" font-weight="700">⚕ Sehat AI</text>
  <rect x="820" y="56" width="110" height="28" rx="14" fill="#063b35"/>
  <text x="842" y="76" fill="#34d399" font-family="Arial, sans-serif" font-size="13">50 Diseases</text>
  <rect x="945" y="56" width="95" height="28" rx="14" fill="#082f49"/>
  <text x="962" y="76" fill="#7dd3fc" font-family="Arial, sans-serif" font-size="13">CSV Engine</text>
  <rect x="1054" y="56" width="58" height="28" rx="14" fill="#dc2626"/>
  <text x="1068" y="76" fill="#fff" font-family="Arial, sans-serif" font-size="13" font-weight="700">1122</text>

  <text x="600" y="165" text-anchor="middle" fill="#77f6bc" font-family="Arial, sans-serif" font-size="22">پاکستان ہیلتھ اسسٹنٹ</text>
  <text x="600" y="220" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="48" font-weight="800">اپنی تکلیف بتائیں</text>
  <text x="600" y="272" text-anchor="middle" fill="#34d399" font-family="Arial, sans-serif" font-size="46" font-weight="800">Sehat AI مدد کرے گا</text>
  <text x="600" y="312" text-anchor="middle" fill="#a7b6c2" font-family="Arial, sans-serif" font-size="19">Type symptoms in Urdu or English — instant smart guidance.</text>

  <g filter="url(#shadow)">
    <rect x="270" y="350" width="660" height="210" rx="22" fill="url(#card)" stroke="#123b47"/>
    <text x="306" y="392" fill="#d1fae5" font-family="Arial, sans-serif" font-size="18" font-weight="700">✍ علامات لکھیں / Write Your Symptoms</text>
    <rect x="306" y="415" width="588" height="78" rx="12" fill="#091722" stroke="#175e61"/>
    <text x="326" y="450" fill="#d7dee6" font-family="Arial, sans-serif" font-size="17">fever, headache, body ache, cough...</text>
    <rect x="306" y="513" width="260" height="34" rx="17" fill="#16a34a"/>
    <text x="366" y="536" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="700">Analyse Symptoms</text>
    <rect x="580" y="513" width="95" height="34" rx="17" fill="#111827" stroke="#334155"/>
    <text x="610" y="536" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Clear</text>
  </g>

  <text x="600" y="607" text-anchor="middle" fill="#6ee7b7" font-family="Arial, sans-serif" font-size="16">CS-602 Sehat AI — Smart Health Assistant</text>
</svg>
